<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ContractsIntel</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
        background: #f8f9fb;
      }
      h1 {
        margin: 0 0 4px 0;
        font-size: 16px;
      }
      p.hint {
        margin: 0 0 12px 0;
        font-size: 12px;
        color: #64748b;
        line-height: 1.4;
      }
      label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #64748b;
        margin: 10px 0 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        font-size: 13px;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        background: #fff;
      }
      input:focus {
        outline: none;
        border-color: #2563eb;
      }
      button {
        margin-top: 12px;
        width: 100%;
        background: #2563eb;
        color: #fff;
        border: none;
        padding: 8px 10px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background: #1d4ed8;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        min-height: 14px;
      }
      #status[data-tone="success"] { color: #059669; }
      #status[data-tone="error"] { color: #dc2626; }
    </style>
  </head>
  <body>
    <h1>ContractsIntel</h1>
    <p class="hint">
      Save SAM.gov solicitations to your pipeline. Create an API key at
      Settings → API keys in the dashboard and paste it below.
    </p>

    <label for="apiBase">API base URL</label>
    <input id="apiBase" type="text" placeholder="https://app.contractsintel.com" />

    <label for="apiKey">API key</label>
    <input id="apiKey" type="password" placeholder="ci_live_…" />

    <button id="save" type="button">Save settings</button>
    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
